server {
    listen 80;
    server_name gestorsolar.iasolar.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gestorsolar.iasolar.io;

    ssl_certificate /etc/letsencrypt/live/gestorsolar.iasolar.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gestorsolar.iasolar.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/apisolarman/web/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ ^/api/(.*)$ {
        proxy_pass http://127.0.0.1:4001/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
