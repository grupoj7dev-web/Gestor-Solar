server {
    listen 80;
    server_name app.gestorsolar.com.br;
    root /usr/share/nginx/html;
    index index.html;

    # Maintenance mode for frontend: force redirect from any route.
    location = / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Clear-Site-Data "\"cache\", \"storage\"";
        return 302 https://app.gestorsolar.com.br/maintenance.html;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Clear-Site-Data "\"cache\", \"storage\"";
        return 302 https://app.gestorsolar.com.br/maintenance.html;
    }

    location = /maintenance.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Clear-Site-Data "\"cache\", \"storage\"";
        expires -1;
    }

    # Maintenance mode: block API access during maintenance window
    location /api/ {
        return 302 /maintenance.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    error_page 503 /maintenance.html;
}
