<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor Solar - Manutenção</title>
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 100%);
            color: #111827;
        }
        .card {
            width: min(680px, 92vw);
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 40px 28px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(2, 6, 23, 0.08);
        }
        h1 {
            margin: 0 0 12px;
            font-size: clamp(24px, 4vw, 34px);
            color: #1d4ed8;
        }
        p {
            margin: 0;
            font-size: clamp(16px, 2.6vw, 20px);
            line-height: 1.45;
        }
        .time {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 10px;
            background: #eff6ff;
            color: #1e40af;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Sistema em Manutenção</h1>
        <p>Estamos realizando ajustes e melhorias.</p>
        <p class="time">Retorna ao normal em 13/03/2026 às 08h.</p>
    </main>
</body>
</html>
